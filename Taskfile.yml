version: '3'

vars:
  DOTFILES_DIR:
    sh: pwd
  PLATFORM:
    sh: |
      if [ -n "${PLATFORM:-}" ]; then
        echo "$PLATFORM"
      elif [ "$(uname)" = "Darwin" ]; then
        echo "macos"
      elif grep -q "Microsoft" /proc/version 2>/dev/null || grep -q "WSL" /proc/version 2>/dev/null; then
        echo "wsl"
      elif [ -f /etc/arch-release ]; then
        echo "arch"
      elif [ -f /etc/lsb-release ] && grep -q "Ubuntu" /etc/lsb-release 2>/dev/null; then
        echo "ubuntu"
      else
        echo "Unknown platform" >&2
        exit 1
      fi

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  # ================================================================
  # SYMLINKS MANAGEMENT
  # ================================================================

  symlinks:link:
    desc: Create symlinks from dotfiles to home directory
    silent: true
    cmds:
      - |
        export TERM=${TERM:-xterm}
        source "{{.DOTFILES_DIR}}/configs/common/.local/shell/formatting.sh"
        print_section "Creating symlinks" "cyan"
        uv run symlinks link common
        uv run symlinks link "{{.PLATFORM}}"
        if [ "{{.PLATFORM}}" = "wsl" ]; then
          bash "{{.DOTFILES_DIR}}/install/wsl/sync-windows-shell.sh"
        fi

  symlinks:relink:
    desc: Remove all symlinks and recreate them (idempotent)
    silent: true
    cmds:
      - |
        export TERM=${TERM:-xterm}
        source "{{.DOTFILES_DIR}}/configs/common/.local/shell/formatting.sh"
        print_section "Relinking symlinks" "cyan"
        uv run symlinks relink "{{.PLATFORM}}"
        if [ "{{.PLATFORM}}" = "wsl" ]; then
          bash "{{.DOTFILES_DIR}}/install/wsl/sync-windows-shell.sh"
        fi

  symlinks:check:
    desc: Verify all symlinks are correct
    silent: true
    cmds:
      - uv run symlinks check

  symlinks:show:
    desc: Show all configured symlinks
    silent: true
    cmds:
      - uv run symlinks show

  symlinks:unlink:
    desc: Remove all symlinks
    silent: true
    cmds:
      - |
        export TERM=${TERM:-xterm}
        source "{{.DOTFILES_DIR}}/configs/common/.local/shell/formatting.sh"
        print_section "Removing symlinks" "cyan"
        # Unlink platform first (overlay), then common (base layer)
        uv run symlinks unlink "{{.PLATFORM}}"
        uv run symlinks unlink common

  # ================================================================
  # TESTING
  # ================================================================

  test:
    desc: Run all BATS tests (library + unit + integration)
    cmds:
      - bats tests/libraries/*.bats tests/install/unit/*.bats tests/install/integration/*.bats

  test:unit:
    desc: Run unit tests (libraries + installer functions, no Docker)
    cmds:
      - bats tests/libraries/*.bats tests/install/unit/*.bats

  test:integration:
    desc: Run integration tests (includes Docker tests if image is built)
    cmds:
      - bats tests/install/integration/*.bats

  test:watch:
    desc: Run tests on file changes (requires entr)
    cmds:
      - |
        if ! command -v entr >/dev/null 2>&1; then
          echo "entr not installed. Install with: brew install entr (macOS) or apt install entr (Linux)"
          exit 1
        fi
        find tests -name '*.bats' | entr -c bats tests/libraries/*.bats tests/install/unit/*.bats tests/install/integration/*.bats

  # ================================================================
  # DOCUMENTATION
  # ================================================================

  docs:serve:
    desc: Serve documentation site locally
    cmds:
      - cd docs && mkdocs serve

  docs:build:
    desc: Build documentation site
    cmds:
      - cd docs && mkdocs build

  docs:deploy:
    desc: Deploy documentation to GitHub Pages
    cmds:
      - cd docs && mkdocs gh-deploy --force

  # ================================================================
  # WINDOWS (WSL only)
  # ================================================================

  windows:setup:
    desc: One-time Windows Git Bash setup (run from WSL)
    cmds:
      - bash "{{.DOTFILES_DIR}}/install/wsl/setup-windows.sh"

  windows:sync:
    desc: Sync shell files to Windows Git Bash (run from WSL)
    cmds:
      - bash "{{.DOTFILES_DIR}}/install/wsl/sync-windows-shell.sh"
